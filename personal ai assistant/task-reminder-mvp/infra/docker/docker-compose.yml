version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: taskoverlay-db
    environment:
      POSTGRES_USER: taskoverlay
      POSTGRES_PASSWORD: taskoverlay
      POSTGRES_DB: taskoverlay
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taskoverlay -d taskoverlay"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: taskoverlay-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.api
    container_name: taskoverlay-api
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://taskoverlay:taskoverlay@postgres:5432/taskoverlay?schema=public
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-32-char-min}
      PORT: 4000
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.web
    container_name: taskoverlay-web
    ports:
      - "3000:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
