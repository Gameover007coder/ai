<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <style>
      body { margin: 0; width: 320px; font-family: system-ui, -apple-system, sans-serif; background: #0f172a; color: #e2e8f0; font-size: 13px; }
      .header { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; border-bottom: 1px solid #1e293b; }
      .header h1 { font-size: 14px; margin: 0; font-weight: 600; }
      .list { max-height: 360px; overflow-y: auto; }
      .item { display: flex; align-items: center; gap: 8px; padding: 8px 16px; border-bottom: 1px solid #1e293b; }
      .item:last-child { border-bottom: none; }
      .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
      .title { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .time { color: #64748b; font-size: 11px; flex-shrink: 0; }
      .footer { padding: 8px 16px; border-top: 1px solid #1e293b; text-align: center; }
      .footer a { color: #818cf8; text-decoration: none; font-size: 12px; }
      .empty { color: #64748b; text-align: center; padding: 24px; font-size: 12px; }
      .login { padding: 16px; text-align: center; }
      .login a { color: #818cf8; text-decoration: none; font-size: 12px; }
      .btn { background: #6366f1; color: white; border: none; border-radius: 6px; padding: 6px 12px; cursor: pointer; font-size: 12px; }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script src="popup.js" type="module"></script>
  </body>
</html>
